<svg aria-hidden="true" focusable="false" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
	<!-- Namecoin "map pin" mark, mirroring the original Bitcoin pin silhouette
	     so the explorer header keeps its visual rhythm but identifies as NMC.
	     Brand blue: #1a78d8 (matches coinColorsByNetwork.main in app/coins/nmc.js). -->
	<path fill="#1a78d8" d="M172.268 501.67C26.97 291.031 0 269.413 0 192 0 85.961 85.961 0 192 0s192 85.961 192 192c0 77.413-26.97 99.031-172.268 309.67-9.535 13.774-29.93 13.773-39.464 0z"/>
	<!-- Stylised "N" glyph centred in the pin's head. The geometry is built from
